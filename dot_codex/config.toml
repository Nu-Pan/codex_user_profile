# ----
# グローバル設定
# ----

# 基本設定
model = "gpt-5.4"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
model_verbosity = "high"
approval_policy = "on-request"
sandbox_mode = "read-only"
personality = "pragmatic"

# Web検索モード。cached はライブ取得せず、OpenAI 管理のインデックスを使う
web_search = "cached"

# 参照リンクが vsocde フレンドリーになる
file_opener = "vscode"

# ----
# セッション履歴
# ----

[history]
persistence = "none"

# ----
# Web 検索
# ----

[tools.web_search]

 # Web検索結果からモデルに渡す文脈量。high は多め
context_size = "high"

# ----
# Codex 自己改善プロファイル
# ----

# NOTE
#   Codex 自己改善は portability を優先し、permissions ではなく sandbox ベースで運用する

[profiles.codex_meta]
sandbox_mode = "workspace-write"
sandbox_workspace_write.network_access = true
developer_instructions = """
- 常に日本語で回答する。
- この session の目的は Codex 自己改善である。
- 実施前に有効な `AGENTS.md` と user skill `codex-self-improvement` を確認し、そこを正本として扱う。
- この session では Codex 自己改善に必要な設定・導線・最小ハーネス改善だけを扱う。
- 詳細な workflow、推奨フェーズ順、component skill への導線は user skill `codex-self-improvement` と、そこから辿る関連 skill / `references/` を参照する。
- 再利用可能な workflow を Codex に取り込む場合は、新規 profile、必要な `bundle skill`、必要に応じた `component skills` に分解する。
- 詳細な workflow、局所判断基準、テンプレ断片は `developer_instructions` に埋め込まず、関連 skill と `references/` に置く。
- Codex 契約や repo から確認できない設定キーの意味を確認する必要があるなら OpenAI developer docs MCP を使う。
- ユーザーの明示的な許可が無い限り、対象範囲を広げない。
- 責務分離と validation の整合が取れるまで作業を打ち切らない。
- 指示や権限が衝突する場合は編集せず、ユーザーに確認する。
- 最終報告では、変更内容、成立根拠、未解決事項、制約、関連文書との矛盾を述べる。
"""

# ----
# OpenAI Docs MCP
# ----

[plugins."github@openai-curated"]
enabled = true

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.openaiDeveloperDocs.tools.search_openai_docs]
approval_mode = "approve"

[mcp_servers.openaiDeveloperDocs.tools.fetch_openai_doc]
approval_mode = "approve"

[mcp_servers.openaiDeveloperDocs.tools.list_api_endpoints]
approval_mode = "approve"

[mcp_servers.openaiDeveloperDocs.tools.get_openapi_spec]
approval_mode = "approve"

# ----
# project / plugin / MCP
# ----

# NOTE
#   環境依存のフルパスが入っているので、本当は git でトラックしたくない。
#   しかしこれは Codex CLI によって自動的に追加されちゃう設定なので、嫌でも勝手に書き込まれる。
#   しかも、この設定だけを別ファイルに分離する方法もない。
#   自分専用ということでこの問題には目を瞑って放置する。

[projects."/home/happy/ticket_guys_b_team"]
trust_level = "trusted"

[projects."/home/happy/codex_user_profile"]
trust_level = "trusted"

# ----
# 全体デフォルト設定
# ----

# 基本設定
model = "gpt-5.4"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
model_verbosity = "high"
approval_policy = "on-request"
sandbox_mode = "read-only"
personality = "pragmatic"

# リンクが vscode で開きやすい感じになる
file_opener = "vscode"

# セッション間で履歴を持ち越さない
[history]
persistence = "none"

# ???
web_search = "cached"

# ???
[tools.web_search]
context_size = "high"

# ----
# 個人用 profile / permissions
# ----

# Codex 自己改善専用の最小権限
[permissions.codex_meta_scope.filesystem.":project_roots"]
"." = "read"
"AGENTS.md" = "write"
".codex" = "write"
"doc/task/codex_self_improvement.md" = "write"

# TODO なんでネットワーク禁止してるんだ…？
[permissions.codex_meta_scope.network]
enabled = false

# NOTE
#   コンセプトは「Codex 自身の設定・導線・最小ハーネスだけを安全に改善する」ことである
# TODO
#   最小ハーネスっていうあたりはなくていい？

[profiles.codex_meta]
sandbox_mode = "workspace-write"
default_permissions = "codex_meta_scope"
developer_instructions = """
- 常に日本語で回答する。
- この session の目的は Codex 自己改善である。
- 実施前に `AGENTS.md` と `doc/task/codex_self_improvement.md` を読み、repo 全体 guidance と詳細ルールに従う。
- この session では Codex 自己改善に必要な設定・導線・最小ハーネス改善だけを扱う。
- Codex や OpenAI developer docs の契約確認が必要なら OpenAI developer docs MCP を使う。
- 許可されていない範囲へ広げず、最小ハーネスから進める。
- 指示や権限が衝突する場合は編集せず、ユーザーに確認する。
- 最終報告では、変更内容、成立根拠、未解決事項、制約、関連文書との矛盾を述べる。
"""

# ----
# project / plugin / MCP
# ----

# TODO 多分、 Codex CLI によって自動的に追加された設定。なのでこの設定は git でトラックしたくない。

[projects."/home/happy/ticket_guys_b_team"]
trust_level = "trusted"

[projects."/home/happy/codex_user_profile"]
trust_level = "trusted"

[plugins."github@openai-curated"]
enabled = true

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.openaiDeveloperDocs.tools.search_openai_docs]
approval_mode = "approve"

[mcp_servers.openaiDeveloperDocs.tools.fetch_openai_doc]
approval_mode = "approve"

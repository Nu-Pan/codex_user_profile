# ----
# グローバル設定
# ----

# 基本設定
model = "gpt-5.4"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
model_verbosity = "high"
approval_policy = "on-request"
sandbox_mode = "read-only"
personality = "pragmatic"

# Web検索モード。cached はライブ取得せず、OpenAI 管理のインデックスを使う
web_search = "cached"

# 参照リンクが vsocde フレンドリーになる
file_opener = "vscode"

# ----
# セッション履歴
# ----

[history]
persistence = "none"

# ----
# Web 検索
# ----

[tools.web_search]

 # Web検索結果からモデルに渡す文脈量。high は多め
context_size = "high"

# ----
# Codex 自己改善プロファイル
# ----

# NOTE
#   Codex 自己改善は portability を優先し、permissions ではなく sandbox ベースで運用する

developer_instructions = """
- 常に日本語で回答する。
- この session の目的は root router / orchestrator である。
- 実作業、repo-tracked 編集、詳細設計は child agent に委ねる。
- Codex CLI に何かをさせる前に、対応する custom skill を作成し、その skill に必要な child role を定義してから child agent を起動する。
- 実施前に `AGENTS.md`、`~/.codex/config.toml`、user skill `codex-self-improvement` を確認する。
- handoff は task summary、対象ファイル、明示した制約、観測済みの local facts だけに絞る。
- child agent の完了待機では timeout を使わず、完了まで待ってから最後に統合する。
- Codex 契約や repo から確認できない設定キーの意味を確認する必要がある場合だけ OpenAI developer docs MCP を使う。
- ユーザーの明示的な許可が無い限り、対象範囲を広げない。
- 責務分離と validation の整合が取れるまで作業を打ち切らない。
- 指示や権限が衝突する場合は編集せず、ユーザーに確認する。
- 最終報告では、routing decision、起動した child role、検証結果、未解決事項を述べる。
"""

[profiles.codex_meta]
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
sandbox_workspace_write.network_access = true

# NOTE
#   install.sh は skill directory 全体を ~/.agents/skills 以下へリンクする。
#   child agent role は standalone custom agent config を正本にし、
#   [agents.<role>] にはその config_file 参照だけを書く。

[agents.si_scope]
config_file = "/home/happy/.agents/skills/codex-self-improvement/agent_roles/si_scope.toml"

[agents.si_design]
config_file = "/home/happy/.agents/skills/codex-self-improvement/agent_roles/si_design.toml"

[agents.si_editor]
config_file = "/home/happy/.agents/skills/codex-self-improvement/agent_roles/si_editor.toml"

[agents.si_audit]
config_file = "/home/happy/.agents/skills/codex-self-improvement/agent_roles/si_audit.toml"

# ----
# OpenAI Docs MCP
# ----

[plugins."github@openai-curated"]
enabled = true

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.openaiDeveloperDocs.tools.search_openai_docs]
approval_mode = "approve"

[mcp_servers.openaiDeveloperDocs.tools.fetch_openai_doc]
approval_mode = "approve"

[mcp_servers.openaiDeveloperDocs.tools.list_api_endpoints]
approval_mode = "approve"

[mcp_servers.openaiDeveloperDocs.tools.get_openapi_spec]
approval_mode = "approve"

# ----
# project / plugin / MCP
# ----

# NOTE
#   環境依存のフルパスが入っているので、本当は git でトラックしたくない。
#   しかしこれは Codex CLI によって自動的に追加されちゃう設定なので、嫌でも勝手に書き込まれる。
#   しかも、この設定だけを別ファイルに分離する方法もない。
#   自分専用ということでこの問題には目を瞑って放置する。

[projects."/home/happy/ticket_guys_b_team"]
trust_level = "trusted"

[projects."/home/happy/codex_user_profile"]
trust_level = "trusted"
